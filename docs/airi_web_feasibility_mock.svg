<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef4ff"/>
      <stop offset="50%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#f4f0ff"/>
    </linearGradient>
    <linearGradient id="stageGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dfe9ff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.72"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.86"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.62"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#90a4d4" flood-opacity="0.22"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#7f8fb0" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <rect x="50" y="34" width="1500" height="64" rx="20" fill="#ffffff" fill-opacity="0.58" filter="url(#softShadow)"/>
  <text x="86" y="74" font-size="24" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" fill="#4b5563">SmartAgent4 Cockpit</text>
  <rect x="1220" y="50" width="280" height="30" rx="15" fill="#f3f4f6"/>
  <text x="1248" y="70" font-size="14" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" fill="#6b7280">ASR 输入 / 状态栏保留</text>

  <g opacity="0.95">
    <rect x="62" y="250" width="48" height="48" rx="14" fill="#ffffff" fill-opacity="0.66"/>
    <rect x="62" y="312" width="48" height="48" rx="14" fill="#ffffff" fill-opacity="0.66"/>
    <rect x="62" y="374" width="48" height="48" rx="14" fill="#ffffff" fill-opacity="0.66"/>
    <rect x="62" y="436" width="48" height="48" rx="14" fill="#ffffff" fill-opacity="0.66"/>
  </g>

  <rect x="190" y="150" width="890" height="610" rx="36" fill="url(#stageGlow)" stroke="#ffffff" stroke-opacity="0.7" filter="url(#shadow)"/>
  <text x="230" y="204" font-size="22" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" fill="#5b6475">Airi Stage（建议新增）</text>
  <text x="230" y="235" font-size="14" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" fill="#7b8796">角色位放在中部偏左，右侧继续保留文字助手面板</text>

  <ellipse cx="635" cy="650" rx="220" ry="40" fill="#b7c8f1" fill-opacity="0.35"/>
  <circle cx="635" cy="360" r="135" fill="#eef4ff" stroke="#c9d8fb" stroke-width="8"/>
  <path d="M555 510 C570 438, 585 420, 635 420 C685 420, 700 438, 715 510 L760 680 C768 724, 734 760, 690 760 H580 C536 760, 502 724, 510 680 Z" fill="#f7fbff" stroke="#c9d8fb" stroke-width="8"/>
  <path d="M585 342 Q635 300 685 342" stroke="#7c8db7" stroke-width="8" fill="none" stroke-linecap="round"/>
  <circle cx="595" cy="364" r="12" fill="#52607a"/>
  <circle cx="675" cy="364" r="12" fill="#52607a"/>
  <path d="M600 414 Q635 438 670 414" stroke="#ef7ba7" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M575 296 Q635 250 695 296" stroke="#97a8da" stroke-width="14" fill="none" stroke-linecap="round"/>
  <circle cx="758" cy="292" r="38" fill="#dfe7ff"/>
  <text x="742" y="300" font-size="24" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" fill="#5f6fb2">♪</text>

  <rect x="850" y="252" width="180" height="46" rx="23" fill="#ffffff" fill-opacity="0.84"/>
  <circle cx="882" cy="275" r="8" fill="#34d399"/>
  <text x="900" y="281" font-size="16" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" fill="#4b5563">状态：Speaking</text>

  <rect x="850" y="318" width="180" height="46" rx="23" fill="#ffffff" fill-opacity="0.84"/>
  <text x="878" y="347" font-size="16" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" fill="#4b5563">角色：xiaozhi</text>

  <rect x="850" y="384" width="180" height="46" rx="23" fill="#ffffff" fill-opacity="0.84"/>
  <text x="878" y="413" font-size="16" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" fill="#4b5563">表情：smile</text>

  <rect x="850" y="450" width="180" height="46" rx="23" fill="#ffffff" fill-opacity="0.84"/>
  <text x="878" y="479" font-size="16" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" fill="#4b5563">动作：nod</text>

  <rect x="448" y="792" width="380" height="48" rx="24" fill="#ffffff" fill-opacity="0.8"/>
  <text x="488" y="822" font-size="15" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" fill="#6b7280">这里可放字幕 / 语音波形 / 连接状态提示</text>

  <rect x="1155" y="150" width="380" height="500" rx="28" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.7" filter="url(#shadow)"/>
  <text x="1190" y="196" font-size="22" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" fill="#5b6475">AssistantPanel（现有）</text>
  <rect x="1180" y="222" width="130" height="34" rx="17" fill="#ffffff" fill-opacity="0.9"/>
  <text x="1210" y="244" font-size="14" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" fill="#5b6475">小智</text>
  <rect x="1180" y="282" width="330" height="88" rx="18" fill="#f7fbff" stroke="#e0e7ff"/>
  <text x="1200" y="318" font-size="16" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" fill="#374151">你好，我已根据当前驾驶状态...</text>
  <text x="1200" y="346" font-size="14" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" fill="#7b8796">情绪：愉快 · 动作：点头</text>
  <rect x="1180" y="390" width="270" height="78" rx="18" fill="#4f7cff" fill-opacity="0.88"/>
  <text x="1200" y="435" font-size="16" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" fill="#ffffff">用户：帮我规划一下这次行程</text>
  <rect x="1180" y="488" width="330" height="96" rx="18" fill="#fff7fb" stroke="#ffd6e7"/>
  <text x="1200" y="525" font-size="16" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" fill="#374151">可以，我会同步给出路线、天气...</text>
  <text x="1200" y="554" font-size="14" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" fill="#7b8796">情绪：平和 · 语音播放中</text>

  <rect x="410" y="790" width="320" height="80" rx="22" fill="#ffffff" fill-opacity="0.64" filter="url(#softShadow)"/>
  <text x="440" y="822" font-size="16" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" fill="#4b5563">会话管理</text>
  <text x="440" y="848" font-size="13" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" fill="#7b8796">底部卡片建议保持不变</text>

  <rect x="760" y="790" width="320" height="80" rx="22" fill="#ffffff" fill-opacity="0.64" filter="url(#softShadow)"/>
  <text x="790" y="822" font-size="16" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" fill="#4b5563">用户记忆</text>
  <text x="790" y="848" font-size="13" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" fill="#7b8796">AIRI 角色区不占用记忆卡片空间</text>

  <rect x="1110" y="692" width="430" height="130" rx="26" fill="#ffffff" fill-opacity="0.68" filter="url(#softShadow)"/>
  <text x="1140" y="726" font-size="18" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" fill="#4b5563">推荐实现路径</text>
  <text x="1140" y="756" font-size="14" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" fill="#6b7280">先用 2D 角色舞台验证整体效果，</text>
  <text x="1140" y="782" font-size="14" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" fill="#6b7280">再决定是否升级为 Live2D / VRM。</text>
</svg>
