# ============================================================
# SmartAgent4 Docker Compose 配置
# 用于在 Windows 上快速启动 PostgreSQL 数据库
#
# 前置条件：安装 Docker Desktop for Windows
# 启动命令：docker-compose up -d
# 停止命令：docker-compose down
# ============================================================

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: smartagent4-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: smart_agent
    ports:
      - "5432:5432"
    volumes:
      - smartagent4_pg_data:/var/lib/postgresql/data

volumes:
  smartagent4_pg_data:
    driver: local
